<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shop Online - Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Our Products</h1>
        <div class="d-flex align-items-center">
            <div th:if="${user != null}" class="me-3 text-success fw-bold">
                Welcome, <span th:text="${user.loginId}">User</span>!
            </div>
            <a href="/cart" class="btn btn-outline-primary me-2">View Cart</a>
            <a href="/orders" class="btn btn-outline-secondary me-2">My Orders</a>
            
            <div th:if="${user == null}" class="d-inline">
                <a href="/login" class="btn btn-primary me-2">Login</a>
                <a href="/register" class="btn btn-outline-info me-2">Register</a>
            </div>
            
            <div th:if="${user != null}" class="d-inline">
                <a href="http://localhost:8081/customer" class="btn btn-outline-warning me-2">Profile</a>
                <a href="/logout" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </div>

    <div class="row">
        <div th:each="product : ${products}" class="col-md-4 mb-3">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                    <p class="card-text" th:text="${product.description}">Description</p>
                    <p class="card-text fw-bold">$<span th:text="${product.price}">0.00</span></p>
                    <form th:action="@{/cart/add}" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <div class="input-group mb-3">
                            <input type="number" name="quantity" value="1" min="1" class="form-control">
                            <button class="btn btn-success" type="submit">Add to Cart</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
