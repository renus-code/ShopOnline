<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Order Details</h1>
        <a th:href="@{/orders(userId=${order.webUserId})}" class="btn btn-outline-primary">Back to My Orders</a>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-light">
            <h5 class="mb-0">Summary for Order #<span th:text="${order.orderId}">ID</span></h5>
        </div>
        <div class="card-body">
            <p><strong>Date:</strong> <span th:text="${#dates.format(order.orderedDate, 'dd-MMM-yyyy HH:mm')}">Date</span></p>
            <p><strong>Status:</strong> <span class="badge bg-primary" th:text="${order.status}">STATUS</span></p>
            <p><strong>Shipping Address:</strong> <span th:text="${order.shipToAddress}">Address</span></p>
            <p><strong>Total Amount:</strong> $<span th:text="${order.totalAmount}">0.00</span></p>
        </div>
    </div>

    <h3>Items Ordered</h3>
    <table class="table">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${order.orderItems}">
                <td th:text="${item.productName}">Product</td>
                <td th:text="${item.price}">$0.00</td>
                <td th:text="${item.quantity}">1</td>
                <td th:text="${item.price * item.quantity}">$0.00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="table-light">
                <th colspan="3" class="text-end">Total:</th>
                <th>$<span th:text="${order.totalAmount}">0.00</span></th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
