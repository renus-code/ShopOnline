<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shop Online - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Login</h4>
                </div>
                <div class="card-body">
                    <div th:if="${param.logout}" class="alert alert-info py-2">
                        You have been logged out.
                    </div>
                    <div th:if="${param.registered}" class="alert alert-success py-2">
                        Registration successful! Please login.
                    </div>
                    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}">
                        Error message
                    </div>
                    
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="loginId" class="form-label">Login ID</label>
                            <input type="text" name="loginId" id="loginId" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Login</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <span>Don't have an account? <a href="/register">Register here</a></span>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="/" class="text-decoration-none">&larr; Back to Shop</a>
            </div>
        </div>
    </div>
</body>
</html>
