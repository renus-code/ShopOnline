<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Shopping Cart</h1>
        <div>
            <span th:if="${user != null}" class="me-3 text-success">Logged in as: <strong th:text="${user.loginId}">User</strong></span>
            <a href="/" class="btn btn-outline-primary">Continue Shopping</a>
        </div>
    </div>

    <div th:if="${cart.items.empty}" class="alert alert-info">
        Your cart is empty.
    </div>

    <div th:if="${!cart.items.empty}">
        <table class="table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart.items}">
                    <td th:text="${item.productName}">Product</td>
                    <td th:text="${item.price}">$0.00</td>
                    <td th:text="${item.quantity}">1</td>
                    <td th:text="${item.price * item.quantity}">$0.00</td>
                    <td>
                        <form th:action="@{/cart/remove}" method="post">
                            <input type="hidden" name="productId" th:value="${item.productId}">
                            <input type="hidden" name="userId" th:value="${userId}">
                            <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <th colspan="3" class="text-end">Grand Total:</th>
                    <th th:text="${cart.totalPrice}">$0.00</th>
                    <th></th>
                </tr>
            </tfoot>
        </table>

        <div class="card mt-4 p-4 shadow-sm">
            <h3>Checkout</h3>
            <div th:if="${customer != null}" class="mb-3">
                <p class="text-muted">Welcome back, <strong th:text="${customer.loginId}">User</strong>! We've loaded your details from our Customer Service.</p>
            </div>
            <form th:action="@{/order/place}" method="post">
                <input type="hidden" name="userId" th:value="${userId}">
                <div class="mb-3">
                    <label for="shippingAddress" class="form-label">Shipping Address</label>
                    <textarea class="form-control" id="shippingAddress" name="shippingAddress" required 
                              placeholder="Enter your full address here..."
                              th:text="${customer != null ? customer.address : ''}"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Place Order</button>
            </form>
        </div>
    </div>
</body>
</html>
