<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>My Orders</h1>
        <a href="/" class="btn btn-outline-primary">Continue Shopping</a>
    </div>

    <div th:if="${orders.empty}" class="alert alert-info">
        No orders found.
    </div>

    <div th:if="${!orders.empty}">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.orderId}">ID</td>
                    <td th:text="${#dates.format(order.orderedDate, 'dd-MMM-yyyy HH:mm')}">Date</td>
                    <td>
                        <span th:class="${order.status.name() == 'NEW' ? 'badge bg-primary' : 'badge bg-secondary'}"
                              th:text="${order.status}">STATUS</span>
                    </td>
                    <td th:text="${order.totalAmount}">$0.00</td>
                    <td>
                        <a th:href="@{/order/detail(orderId=${order.orderId})}" class="btn btn-info btn-sm">View Details</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
